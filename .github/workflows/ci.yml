name: CI

# Ground Rule 6: lint + type-check + tests on every push. The tree is green
# at every commit; this workflow is the enforcement.
on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests scripts

      - name: Format check (black)
        run: black --check src tests scripts

      - name: Type-check (mypy)
        run: mypy

      - name: Tests (pytest)
        run: pytest
