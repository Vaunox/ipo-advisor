<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>IPO Advisor — starting</title>
    <style>
      :root { --bg:#0a0d12; --tx:#e6ecf3; --tx2:#95a3b4; --tx3:#5f6d7e; --apply:#3ddc84; --line2:#28323f; }
      * { box-sizing:border-box; margin:0; padding:0; }
      html, body { height:100%; }
      body {
        background:var(--bg); color:var(--tx);
        font-family:'Fira Sans', system-ui, sans-serif;
        display:flex; align-items:center; justify-content:center;
        -webkit-user-select:none; user-select:none;
      }
      .in { text-align:center; }
      .logo {
        width:56px; height:56px; border-radius:15px; margin:0 auto 16px;
        background:linear-gradient(135deg, var(--apply), #1f9d55);
        display:grid; place-items:center; color:#04120a; font-weight:800; font-size:26px;
        font-family:'Fira Code', monospace; animation:pop .55s cubic-bezier(.2,1,.3,1);
      }
      .name { font-size:20px; font-weight:700; letter-spacing:-.01em; margin-bottom:22px; }
      .steps { display:flex; flex-direction:column; gap:10px; width:230px; margin:0 auto;
        font-family:'Fira Code', monospace; font-size:12px; text-align:left; }
      .s { color:var(--tx3); display:flex; align-items:center; gap:10px; }
      .s::before { content:"○"; font-size:11px; }
      .s.on { color:var(--tx2); }
      .spin { display:inline-block; width:11px; height:11px; border:2px solid var(--line2);
        border-top-color:var(--apply); border-radius:50%; animation:rot .8s linear infinite; }
      @keyframes pop { from { transform:scale(.55); opacity:0; } to { transform:scale(1); opacity:1; } }
      @keyframes rot { to { transform:rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="in">
      <div class="logo">◆</div>
      <div class="name">IPO Advisor</div>
      <div class="steps">
        <div class="s on"><span class="spin"></span> Starting engine…</div>
        <div class="s">○&nbsp; Health check&nbsp; /health</div>
        <div class="s">○&nbsp; Loading verdicts</div>
      </div>
    </div>
  </body>
</html>
