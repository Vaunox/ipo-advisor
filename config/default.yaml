# Base configuration. Layered: default.yaml <- config/env/<env>.yaml <- IPO_ env vars.
# Ground Rule 2: every tunable parameter lives here, never hard-coded in logic.
# Secrets NEVER appear in config — see core/secrets.py.

env: dev

logging:
  level: INFO        # DEBUG | INFO | WARNING | ERROR | CRITICAL
  json: true         # structured key/value output (Ground Rule 8)

storage:
  data_dir: data_store        # local parquet cache (gitignored)
  calibrator_dir: data_store/calibrators

scrape:
  # Polite-scraper contract (Deep Dive #1, Module 3).
  rate_limit_per_sec: 0.5
  backoff_factor: 2.0
  max_retries: 4
  user_agent: "ipo-advisor/0.1 (research; advisory-only; no order execution)"
  cadence_minutes_default: 360          # background refresh cadence
  cadence_minutes_subscription_window: 30   # denser while a book is open (GMP moves)

verdict_thresholds:
  # Placeholder cutoffs — EARNED and re-tuned against backtested outcomes in Phase 4.
  apply: 0.65
  marginal: 0.50
  # Regime stress-test outcome: the probability does not calibrate in cold markets, so
  # below this market_regime the verdict is FLAGGED (ranking reliable, probability less
  # certain) rather than the number being forced. See docs/REGIME_FIX.md.
  cold_regime_flag: -0.3

calibration:
  # Calibration is SACRED. These govern the Phase-4 reliability gate.
  method: platt                   # platt | isotonic (Platt default for ~100 IPOs, DD#4)
  reliability_tolerance: 0.10     # max |predicted - observed| per bucket (ECE bound)
  n_buckets: 10
  min_training_samples: 100       # >=100 labeled mainboard IPOs required
  random_seed: 17                 # determinism (Ground Rule 7)
  exit_price: open                # listing-day flip exits at the open (DD#4 Module A)
  nominal_application_value: 15000  # to amortize the flat DP charge into the net label
  walk_forward_initial: 60        # initial training window before first OOS block
  walk_forward_step: 20           # roll size
  min_auc: 0.55                   # discrimination floor (gate check 1)
  base_rate_margin: 0.05          # APPLY precision must beat base rate by this (check 3)

# NSE delivery (CNC) listing-day SELL costs, verified June 2026.
# Constants are structural (core/constants.py); the RATES are tunable and live here.
sell_costs:
  brokerage: 0.0
  stt_rate: 0.001            # 0.1% on the sell value (dominant cost)
  dp_charge_per_isin: 15.34  # flat, per ISIN per sell-day
  exchange_rate: 0.0000297   # ~0.00297%
  gst_rate: 0.18             # on (brokerage + exchange)
  sebi_rate: 0.000001        # Rs 10 per crore
  stamp_rate_sell: 0.0       # nil on the sell leg

features:
  # Construction + normalization knobs (Deep Dive #2). Tuned empirically in Phase 4.
  gmp:
    winsor_max_pct: 100.0       # clip GMP% before any transform (one bad print can't swing)
    saturation_scale_pct: 25.0  # diminishing returns past ~25% (applied in the scorer)
    slope_days: 2               # final-days slope window
    slope_scale_pct: 15.0       # signed-saturation scale for the slope
  subscription:
    winsor_max_x: 200.0         # clip oversubscription multiple
    saturation_scale_x: 20.0    # 40x and 80x both mean "very strong"
  anchor:
    # Recognized marquee anchors — MAINTAINED HERE, never hardcoded in code.
    recognized:
      - "SBI"
      - "ICICI Prudential"
      - "HDFC"
      - "Nippon"
      - "Axis"
      - "Kotak"
      - "Aditya Birla Sun Life"
      - "Mirae"
      - "Government of Singapore"
      - "Abu Dhabi Investment Authority"
      - "Norges"
      - "Government Pension Fund"
      - "Nomura"
      - "Morgan Stanley"
      - "Goldman Sachs"
    weight_marquee: 0.5
    weight_lockin: 0.3
    weight_full_placement: 0.2
    lockin_reference_days: 90    # lock-in at/above this scores full on that component
  valuation:
    peerless_policy: neutral_flag   # neutral_flag | mild_negative
  regime:
    # Cold-market FLAG blend (v2 B2, weight 0 — never moves the probability). trend_weight 1.0
    # keeps the trend read at full weight (a neutral-VIX day = the old trend-only flag); vol_weight
    # is how hard elevated India VIX nudges toward the cold flag. a-priori, untuned.
    trend_weight: 1.0
    vol_weight: 0.4
    vix_reference: 15.0   # India VIX ~15 = neutral volatility (vol_stress 0)
    vix_scale: 15.0       # VIX ~30 (ref+scale) = full stress (vol_stress +1)
  # Missing a critical feature (or an unclosed book) -> INSUFFICIENT_SIGNAL (Layer 3).
  # Phase 4 is the official-only model (no GMP yet), so QIB is the critical signal.
  # Phase 5 re-adds `gmp_level` here once the GMP scraper is integrated and recalibrated.
  critical_features:
    - qib_sub

feature_weights:
  # Transparent weighted baseline (Phase 3). PLACEHOLDER priors — tuned in Phase 4.
  # Weights are POSITIVE MAGNITUDES; the scorer owns each feature's sign semantics
  # (GMP/subscription/anchor/regime add; valuation/OFS are brakes that subtract).
  # GMP sets direction, not certainty (Inviolable Rule 5).
  gmp_level: 0.30
  gmp_slope: 0.10
  qib_sub: 0.20
  nii_sub: 0.10
  retail_sub: 0.05
  # OUT of the calibrated number (weight 0) — features that did NOT earn their place, so a future
  # live feed can never silently inject a disproven contribution into the probability the Phase-4
  # calibrator was fit on. Each stays dead until a re-calibration gate earns it:
  #   * ofs_fraction / relative_valuation / anchor_quality — CUT / not-earned / not-tested by the
  #     enhancement gate (docs/ENHANCEMENT_GATE.md): QIB-redundant, same as GMP (docs/GMP_GATE.md).
  #     (Scorer still owns their sign semantics — valuation/OFS brakes — but weight 0 = no effect.)
  #   * market_regime — flag-only; the cold-market flag reads it but must not move the number
  #     (REGIME_FIX: "flag, don't force"; docs/REGIME_FIX.md).
  anchor_quality: 0.0
  relative_valuation: 0.0
  ofs_fraction: 0.0
  market_regime: 0.0

killflags:
  # Hard overrides -> forced SKIP (Deep Dive #3). Sanity bounds, NOT return-tuned.
  gmp_collapse_slope_pct: -10.0   # GMP falling >= 10% of band over the final days
  near_total_ofs: 0.95            # >= 95% OFS = pure promoter exit, no fresh capital

gmp:
  # Grey-market premium reconstruction (Deep Dive #5) — unofficial, noisy, deferred.
  # Live capture is easy (free trackers); historical reconstruction is the hard part.
  winsor_min: -100.0             # clip absurd rupee-premium prints before any use
  winsor_max: 1000.0
  divergence_band_frac: 0.5      # sources differ by > 50% of the median -> low confidence
  collapse_drop_frac: 0.4        # peak-to-close drop > 40% -> spike-collapse pattern
  min_coverage_days: 3           # min GMP days in the window before the feature is "present"
  sources: ["investorgain", "ipowatch", "chittorgarh"]
  primary: "investorgain"

notify:
  enabled: false
  channel: none        # none | push | telegram | email
  threshold_verdict: APPLY

ingest:
  # History depth for the Phase-4 calibration sample (~357 mainboard IPOs available
  # since 2021; >=100 required). 2021+ keeps the data shape consistent (NII sNII/bNII
  # split is post-2022) and excludes pre-2020 COVID microstructure distortions.
  backfill_start_date: "2021-01-01"
  seed_csv: "seed/mainboard_ipos.csv"   # curated historical seed (committed, real)
  raw_cache_dir: "data_store/raw_cache"  # immutable hashed raw responses (gitignored)
  # Label/backtest-critical fields that must be CROSS-CHECKED against official NSE/BSE
  # and are never taken from an aggregator alone (Deep Dive #1).
  official_required_fields:
    - listing_open
    - listing_close
    - qib_sub
    - nii_sub
    - retail_sub
    - price_band_high
    - segment
